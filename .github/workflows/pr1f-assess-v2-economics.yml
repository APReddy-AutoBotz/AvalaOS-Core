name: PR 1F Assess V2 Economics
on:
  pull_request:
    paths:
      - 'services/assessV2/economics/**'
      - 'services/assessV2EconomicsClient.ts'
      - 'components/assess-v2/AssessV2EconomicsWorkspace*'
      - 'supabase/functions/_shared/assessV2Economics*'
      - 'supabase/migrations/*pr1f*'
      - 'scripts/*Pr1f*'
      - 'scripts/testPr1fMigrations.mjs'
      - 'tests/browser/pr1f.spec.ts'
      - 'docs/architecture/assess-v2-economics-calibration-architecture.md'
  push:
    branches:
      - codex/implement-avala-assess-v2-economics-pr-1f
      - codex/pr-1f-*
jobs:
  pr1f:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:pr1f
      - run: npm run typecheck
      - run: npm run typecheck:edge
      - run: npm run test:ai-boundary-static
      - run: npm run test:secret-hygiene
      - run: npm run build
  pr1f-postgresql-16:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: avala_pr1f
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/avala_pr1f
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:migrations:pr1f
  pr1f-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:browser:pr1f
