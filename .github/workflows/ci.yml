name: AvalaOS Core CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  verify:
    name: AvalaOS Core Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Static AI boundary scan
        run: npm run test:ai-boundary-static

      - name: Secret hygiene scan
        run: npm run test:secret-hygiene

      - name: Regression and policy tests
        run: npm run test

      - name: Production build
        run: npm run build

  supabase-smoke:
    name: Supabase Smoke Checks
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ vars.RUN_SUPABASE_SMOKE == 'true' }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SMOKE_EMAIL: ${{ secrets.SUPABASE_SMOKE_EMAIL }}
      SUPABASE_SMOKE_PASSWORD: ${{ secrets.SUPABASE_SMOKE_PASSWORD }}
      SUPABASE_SMOKE_ORG_ID: ${{ secrets.SUPABASE_SMOKE_ORG_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Delivery RLS smoke test
        run: npm run test:supabase:delivery
