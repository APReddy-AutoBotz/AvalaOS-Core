name: AvalaOS Core CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  verify:
    name: AvalaOS Core Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Edge Function typecheck
        run: npm run typecheck:edge

      - name: PR 1A fail-closed source lint
        run: npm run lint:pr1a

      - name: PR 1B server-authority source lint
        run: npm run lint:pr1b

      - name: PR 1C enterprise Assess and handoff source lint
        run: npm run lint:pr1c

      - name: PR 1D V1 compatibility and V2 decision-intelligence source lint
        run: npm run lint:pr1d

      - name: Static AI boundary scan
        run: npm run test:ai-boundary-static

      - name: Secret hygiene scan
        run: npm run test:secret-hygiene

      - name: Regression and policy tests
        run: npm run test

      - name: PR 1B identity, RBAC, and Assess gates
        run: npm run test:pr1b

      - name: PR 1C tenant, Govern, Studio, and coverage gates
        run: npm run test:pr1c

      - name: PR 1D compatibility, rules, commands, presentation, coverage, and docs gates
        run: npm run test:pr1d

      - name: Production build
        run: npm run build

  enterprise-browser:
    name: PR 1A, PR 1C, and PR 1D Chromium, accessibility, viewport, and performance gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install official Chromium
        run: npx playwright install --with-deps chromium
      - name: Run retained deterministic desktop and mobile browser gates
        run: npm run test:browser
      - name: Run PR 1D browser gates with the dedicated pilot-mode configuration
        run: npm run test:browser:pr1d
  pr1a-migrations:
    name: PR 1A Migration Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PR1A_MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fresh, upgrade, RLS, and failure migration checks
        run: npm run test:migrations:pr1a

  pr1b-migrations:
    name: PR 1B Identity, RLS, and Assess Migration Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PR1B_MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fresh, upgrade, two-tenant RLS, failure, and read-only checks
        run: npm run test:migrations:pr1b

  pr1c-migrations:
    name: PR 1C Govern, Studio Handoff, ACL, and Atomicity Migration Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PR1C_MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ACL, adversarial ancestry, idempotency, concurrency, and rollback checks
        run: npm run test:migrations:pr1c

  pr1d-migrations:
    name: PR 1D V2 Schema, RLS, Snapshot, ACL, and Atomicity Migration Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PR1D_MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fresh, PR 1C upgrade, populated, ACL, RLS, hash, idempotency, concurrency, audit, and rollback checks
        run: npm run test:migrations:pr1d

  supabase-smoke:
    name: Supabase Smoke Checks
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ vars.RUN_SUPABASE_SMOKE == 'true' }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SMOKE_EMAIL: ${{ secrets.SUPABASE_SMOKE_EMAIL }}
      SUPABASE_SMOKE_PASSWORD: ${{ secrets.SUPABASE_SMOKE_PASSWORD }}
      SUPABASE_SMOKE_ORG_ID: ${{ secrets.SUPABASE_SMOKE_ORG_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Delivery RLS smoke test
        run: npm run test:supabase:delivery
