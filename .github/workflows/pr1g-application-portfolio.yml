name: PR 1G Application Portfolio
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  pr1g:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:edge
      - run: npm run test:pr1g
      - run: npm run test:pr1g-coverage
      - run: npm run test:ai-boundary-static
      - run: npm run test:secret-hygiene
      - run: npm run build
      - run: git diff --check
  pr1g-postgresql-16:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: avalaos_pr1g }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npm run test:migrations:pr1g
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/avalaos_pr1g
  pr1g-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser:pr1g
