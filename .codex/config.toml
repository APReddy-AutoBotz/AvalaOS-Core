[agents]
max_threads = 4
max_depth = 1

[agents.architecture_explorer]
description = "Read-only current-state and target-architecture reviewer. Produces findings for the active substantial PR."
config_file = "agents/architecture-explorer.toml"

[agents.security_reviewer]
description = "Read-only security and tenant-boundary reviewer. Distinguishes confirmed defects, suspected defects, and unknown deployment state."
config_file = "agents/security-reviewer.toml"

[agents.quality_reviewer]
description = "Read-only verification, migration, accessibility, performance, and evidence reviewer for the active substantial PR."
config_file = "agents/quality-reviewer.toml"

[agents.implementation_worker]
description = "Implementation worker for one approved vertical slice. Keeps code, tests, documentation, evidence, and rollback together."
config_file = "agents/implementation-worker.toml"
